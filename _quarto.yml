project:
  type: website
  output-dir: docs

website:
  title: "Quartotest"
  navbar:
    left:
      - href: index.md
        text: Home
      - href: p1.md
        text: Pres
      - about.md
  sidebar:
    contents: auto
  page-footer: 
    center: "Copyright &copy; 2023 IBM Corporation"
    left: "Built with Markdown, Quarto and RevealJS - served from Github Enterprise"
  repo-url: https://github.ibm.com/ianj-mitchell/quartotest
  repo-actions: [edit, issue]
format:
  html:
    theme:
      light: [flatly, custom.scss]
      dark:  [darkly, custom.scss]
    css: styles.css
    toc: true
  pdf:
    toc: true
    mainfont: "IBM Plex Sans"
    number-sections: true
    colorlinks: true



