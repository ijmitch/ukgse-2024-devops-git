project:
  type: website

website:
  title: {{ cookiecutter.project_name }}
  repo-url: https://github.ibm.com/ianj-mitchell/quartotest
  repo-actions: [edit, issue]
  search:
    location: navbar
    type: textbox
  navbar:
    left:
      - href: presentation.qmd
        text: Presentation
  page-footer: 
    center: "Copyright &copy; 2024 IBM Corporation"
    left: "Authored in Markdown </br>Built with [Quarto](https://quarto.org) and [RevealJS](https://revealjs.com/) </br>Served from Github Enterprise Pages"
  page-navigation: true
format:
  html:
    theme:
      light: [materia, custom.scss]
      dark:  [cyborg, custom.scss]
    css: styles.css
    toc: true
    toc-expand: true
    grid:
      sidebar-width: 300px
      body-width: 1200px
      margin-width: 300px
      gutter-width: 1.5rem
    mermaid:
      theme: dark
  revealjs: 
    theme: [dark, custom.scss]
    embed-resources: true   
    transition: fade
    footer: "Copyright &copy; {{ cookiecutter.year }} IBM Corporation"
    logo: "IBM_logo_pos_blue60_RGB.png"
    css: logo.css
    slide-number: true
    show-slide-number: all
  pdf:
    toc: true
    mainfont: "IBM Plex Sans"
    number-sections: true
    colorlinks: true
body-header: | 
  This page brought to you by <https://example.com>
margin-footer: |
  ![](IBM_logo_pos_blue60_RGB.png)


